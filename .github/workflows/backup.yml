name: Supabase Daily Backup

on:
  schedule:
    - cron: '0 18 * * *' # 每天 UTC 時間 18:00 (台灣半夜 2:00) 執行
  workflow_dispatch: # 允許手動點擊觸發

# 【關鍵修正】明確賦予 GITHUB_TOKEN 寫入 Repo 的權限
permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 加入依賴快取，優化執行效率

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase

      - name: Run Backup Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python backup.py

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add backups/
          
          # 【修正】轉換為台北時間產生 Commit 訊息，確保資料時間戳記精準
          COMMIT_DATE=$(TZ='Asia/Taipei' date +'%Y-%m-%d %H:%M')
          
          # 使用 echo 取代 exit 0，讓日誌更乾淨
          git commit -m "Auto-backup: 戰略日誌備份 $COMMIT_DATE" || echo "今日無新資料變更，跳過 Commit"
          git push
