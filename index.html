<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 旅遊紀錄</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-color: #0f172a; --panel-bg: #1e293b; --text-main: #f8fafc; --text-sub: #94a3b8;
            --accent: #38bdf8; --accent-glow: rgba(56, 189, 248, 0.4);
            --country-filled: #22c55e; --country-border: #334155; --country-default: #111827;
            --danger: #f43f5e; --rating: #fbbf24;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 1rem; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1200px; }
        header { text-align: center; margin-bottom: 2rem; }
        h1 { font-size: 2.2rem; letter-spacing: 2px; text-shadow: 0 0 15px var(--accent-glow); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background-color: var(--panel-bg); padding: 1.5rem; border-radius: 12px; text-align: center; border: 1px solid #334155; }
        .stat-number { font-size: 2.5rem; font-weight: bold; color: var(--accent); }
        .stat-label { color: var(--text-sub); font-size: 1rem; margin-top: 0.5rem; }
        .sub-text { font-size: 0.8rem; color: #64748b; margin-top: 0.2rem; }

        .chart-wrapper { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .chart-container { background-color: var(--panel-bg); padding: 1rem; border-radius: 12px; border: 1px solid #334155; height: 280px; position: relative; }

        .view-toggle { display: flex; justify-content: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .view-toggle button { width: auto; padding: 0.8rem 1.5rem; background-color: var(--panel-bg); color: var(--text-sub); border: 1px solid #475569; border-radius: 30px; font-size: 0.95rem; cursor: pointer; transition: all 0.2s ease; }
        .view-toggle button:hover { border-color: var(--accent); color: var(--text-main); }
        .view-toggle button.active { background-color: var(--accent); color: var(--bg-color); border-color: var(--accent); font-weight: bold; }

        .data-controls { display: flex; justify-content: center; gap: 1rem; margin-bottom: 1.5rem; width: 100%; flex-wrap: wrap; }
        .btn-data { background-color: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 0.5rem 1.5rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
        .btn-data:hover { background-color: var(--accent); color: var(--bg-color); }

        .map-container { position: relative; background-color: var(--panel-bg); border-radius: 12px; border: 1px solid #334155; overflow: hidden; margin-bottom: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .map-box { height: 600px; width: 100%; z-index: 1; }

        .control-list-wrapper { display: grid; grid-template-columns: 1fr 1.5fr; gap: 1.5rem; align-items: start; }
        @media (max-width: 900px) { .control-list-wrapper { grid-template-columns: 1fr; } }
        
        .control-panel { background-color: var(--panel-bg); padding: 1.5rem; border-radius: 12px; border: 1px solid #334155; }
        .input-group { display: grid; gap: 0.8rem; margin-bottom: 1rem; position: relative; }
        
        input, select { width: 100%; padding: 0.75rem; background-color: var(--bg-color); border: 1px solid #475569; color: var(--text-main); border-radius: 6px; outline: none; }
        input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
        select option { background-color: var(--bg-color); color: var(--text-main); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

        .autocomplete-items { position: absolute; z-index: 99; top: 120px; left: 0; right: 0; background-color: var(--panel-bg); border: 1px solid var(--accent); border-radius: 6px; max-height: 200px; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.7); display: none; }
        .autocomplete-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #334155; font-size: 0.9rem; color: var(--text-main); }
        .autocomplete-item:hover { background-color: var(--accent); color: #0f172a; font-weight: bold; }

        .btn-submit { width: 100%; padding: 1rem; background-color: var(--accent); color: #0f172a; border: none; border-radius: 6px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-submit:hover { background-color: #0284c7; }
        .btn-submit:disabled { background-color: #475569; cursor: not-allowed; }
        .btn-cancel { width: 100%; padding: 0.8rem; background-color: transparent; color: var(--text-sub); border: 1px solid #475569; border-radius: 6px; font-size: 1rem; cursor: pointer; display: none; margin-top: 0.5rem;}
        .btn-cancel:hover { background-color: #334155; color: var(--text-main); }

        .log-section { background-color: var(--panel-bg); padding: 1.5rem; border-radius: 12px; border: 1px solid #334155; height: 100%; min-height: 400px; }
        .log-list { list-style: none; max-height: 500px; overflow-y: auto; padding-right: 0.5rem; }
        .log-list::-webkit-scrollbar { width: 6px; }
        .log-list::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 3px; }
        .log-item { background-color: rgba(0,0,0,0.2); padding: 0.8rem 1rem; border-radius: 8px; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid transparent; transition: 0.2s;}
        .log-item:hover { border-left-color: var(--accent); background-color: rgba(0,0,0,0.3); }
        .log-item.editing { border-left-color: var(--rating); background-color: rgba(251, 191, 36, 0.1); }
        
        .badge-country { font-weight: bold; color: var(--country-filled); }
        .score-badge { font-weight: bold; color: var(--rating); font-size: 0.9rem; }
        .days-badge { font-size: 0.8rem; color: #cbd5e1; background-color: #334155; padding: 2px 6px; border-radius: 4px; margin-left: 5px; }
        
        .action-group { display: flex; gap: 0.5rem; margin-left: 1rem; flex-shrink: 0; }
        .action-btn { background-color: transparent; padding: 0.4rem 0.8rem; font-size: 0.85rem; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .edit-btn { color: var(--accent); border: 1px solid var(--accent); }
        .edit-btn:hover { background-color: var(--accent); color: #0f172a; }
        .delete-btn { color: var(--danger); border: 1px solid var(--danger); }
        .delete-btn:hover { background-color: var(--danger); color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🌍 旅遊紀錄</h1>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">去過國家</div>
                <div class="stat-number" id="count-country">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">探索世界進度</div>
                <div class="stat-number" id="explore-percent">0.00%</div>
                <div class="sub-text" id="explore-area">0 km² / 1.48億 km²</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">解鎖城市總數</div>
                <div class="stat-number" id="count-region">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">旅行分散度 (HHI)</div>
                <div class="stat-number" id="exposure-continent" style="color: var(--rating);">0.00</div>
                <div class="sub-text" id="exposure-country">評估中...</div>
            </div>
        </div>

        <div class="chart-wrapper">
            <div class="chart-container"><canvas id="annualChart"></canvas></div>
            <div class="chart-container"><canvas id="continentPieChart"></canvas></div>
        </div>

        <div class="view-toggle">
            <div class="data-controls">
                <button class="btn-data" onclick="exportData('json')">💾 備份 JSON</button>
                <button class="btn-data" onclick="exportData('csv')">📊 匯出 CSV</button>
                <button class="btn-data" onclick="document.getElementById('import-file').click()">📂 匯入舊版 JSON</button>
                <input type="file" id="import-file" style="display: none;" accept=".json" onchange="importData(event)">
            </div>
            
            <button id="btn-mode-country" class="active" onclick="switchMode('country')">🗺️ A面：國家板塊</button>
            <button id="btn-mode-region" onclick="switchMode('region')">💠 B面：據點標示</button>
            <button id="btn-mode-heat" onclick="switchMode('heat')">🔥 C面：權重熱區</button>
            
            <button onclick="playTimeline()" style="border-color: var(--rating); color: var(--rating);">▶️ 軌跡推演</button>
            <button onclick="recommendNext()" style="background-color: var(--accent); color: var(--bg-color); border: none;">🤖 AI 戰略預測</button>
        </div>

        <div class="map-container">
            <div id="map-main" class="map-box"></div>
        </div>

        <div class="control-list-wrapper">
            <div class="control-panel">
                <form id="tracker-form" autocomplete="off">
                    <div class="input-group">
                        <input type="text" id="input-country" placeholder="國家 (自動帶入或手填)" required>
                        
                        <div>
                            <input type="text" id="input-region" placeholder="省/州/城市 (輸入英文自動搜尋)" required>
                            <div id="autocomplete-list" class="autocomplete-items"></div>
                        </div>
                        
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.8rem;">
                            <div style="display: flex; flex-direction: column; gap: 0.3rem;">
                                <label style="color: var(--text-sub); font-size: 0.85rem; margin-left: 0.2rem;">起始日</label>
                                <input type="date" id="input-date-start" required>
                            </div>
                            <div style="display: flex; flex-direction: column; gap: 0.3rem;">
                                <label style="color: var(--text-sub); font-size: 0.85rem; margin-left: 0.2rem;">結束日</label>
                                <input type="date" id="input-date-end" required>
                            </div>
                        </div>

                        <input type="number" id="input-ranking" min="1" placeholder="Vibe 排名 (例: 1 代表心目中第一名)" required>
                    </div>
                    
                    <button type="submit" id="submit-btn" class="btn-submit">空降新領地 🚀</button>
                    <button type="button" id="cancel-edit-btn" class="btn-cancel" onclick="cancelEdit()">取消編輯</button>
                </form>
            </div>

            <div class="log-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem;">
                    <h2 style="margin: 0; font-size: 1.3rem; color: var(--text-sub);">戰略日誌</h2>
                    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                        <input type="text" id="search-log" placeholder="🔍 搜尋..." style="padding: 0.4rem; font-size: 0.9rem; width: 100px; background-color: var(--bg-color); border: 1px solid #475569; color: var(--text-main); border-radius: 4px;">
                        <select id="filter-continent" style="padding: 0.4rem; font-size: 0.9rem; width: 90px; background-color: var(--bg-color); border: 1px solid #475569; color: var(--text-main); border-radius: 4px;">
                            <option value="all">所有洲</option>
                            <option value="Asia">亞洲</option>
                            <option value="Europe">歐洲</option>
                            <option value="Americas">美洲</option>
                            <option value="Oceania">大洋洲</option>
                            <option value="Africa">非洲</option>
                        </select>
                        <select id="filter-year" style="padding: 0.4rem; font-size: 0.9rem; width: 100px; background-color: var(--bg-color); border: 1px solid #475569; color: var(--text-main); border-radius: 4px;">
                            <option value="all">所有年份</option>
                        </select>
                        <select id="sort-by" style="padding: 0.4rem; font-size: 0.9rem; width: 110px; background-color: var(--bg-color); border: 1px solid #475569; color: var(--text-main); border-radius: 4px;">
                            <option value="date">出征日期</option>
                            <option value="rank">Vibe 排名</option>
                        </select>
                    </div>
                </div>
                
                <div id="country-summary-list" style="margin-bottom: 1rem; max-height: 150px; overflow-y: auto;"></div>
                
                <ul class="log-list" id="log-list"></ul>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. SUPABASE 初始化設定 (⚠️ 請務必換成你的金鑰)
        // ==========================================
        const supabaseUrl = 'https://yrccanqxzrcoknzabifz.supabase.co';
        const supabaseKey = 'sb_publishable_lDfwRDxgMhzRwVk0-Qu3vg_9HTmTFZy';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // ==========================================
        // 2. 核心變數與資料加載
        // ==========================================
        const EARTH_LAND_AREA_KM2 = 148940000;
        let currentMode = 'country';
        let worldGeoJSON = null; 
        let countryAreaCache = {};
        let locations = [];
        let editingId = null;
        let chartBar = null; 
        let chartPie = null;

        // 啟動時從 Supabase 抓取資料
        async function initApp() {
            const { data, error } = await supabaseClient.from('travel_logs').select('*');
            if (error) {
                console.error("Supabase 讀取失敗:", error);
            } else if (data) {
                locations = data.map(d => ({
                    id: d.id, dateStart: d.date_start, dateEnd: d.date_end, dateRange: d.date_range,
                    country: d.country, region: d.region, ranking: d.ranking,
                    lat: d.lat, lng: d.lng, geojson: d.geojson
                }));
            }
            
            try {
                const res = await fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson');
                worldGeoJSON = await res.json();
                renderAll(); 
            } catch (e) { console.error("世界地圖載入失敗:", e); }
        }

        // ==========================================
        // 3. 輔助函數與地圖初始化
        // ==========================================
        function extractYear(loc) {
            if (loc.dateStart && loc.dateStart.length >= 4) return loc.dateStart.substring(0, 4);
            if (loc.dateRange) { const match = loc.dateRange.match(/\d{4}/); if (match) return match[0]; }
            return null;
        }

        function calculateDays(start, end) {
            if (!start || !end) return 1;
            const startD = new Date(start); const endD = new Date(end);
            if(isNaN(startD) || isNaN(endD)) return 1;
            return Math.ceil(Math.abs(endD - startD) / (1000 * 60 * 60 * 24)) + 1;
        }

        const continentMapping = {
            "Asia": ["japan", "taiwan", "thailand", "malaysia", "china", "south korea", "united arab emirates", "singapore", "vietnam", "indonesia", "philippines", "india", "hong kong", "macau"],
            "Europe": ["united kingdom", "france", "germany", "italy", "spain", "ukraine", "netherlands", "switzerland", "sweden", "austria", "belgium", "portugal", "greece", "russia"],
            "Americas": ["united states of america", "united states", "canada", "mexico", "brazil", "argentina", "peru", "chile"],
            "Oceania": ["australia", "new zealand", "fiji"],
            "Africa": ["egypt", "south africa", "morocco", "kenya", "nigeria"]
        };
        const countryAliasMap = { "us": "United States of America", "usa": "United States of America", "uk": "United Kingdom", "prc": "China", "roc": "Taiwan", "ua": "Ukraine" };
        
        // --- 導入 CDN 影像解決 Windows 不支援國旗 Emoji 的問題 ---
        const flagCodeMap = {
            "japan": "jp", "taiwan": "tw", "united kingdom": "gb", "united states of america": "us", "united states": "us",
            "thailand": "th", "malaysia": "my", "china": "cn", "south korea": "kr", "france": "fr", 
            "germany": "de", "italy": "it", "spain": "es", "indonesia": "id", "vietnam": "vn", 
            "singapore": "sg", "australia": "au", "switzerland": "ch", "hong kong": "hk", "macau": "mo", 
            "philippines": "ph", "india": "in", "united arab emirates": "ae", "ukraine": "ua", 
            "netherlands": "nl", "sweden": "se", "austria": "at", "belgium": "be", "portugal": "pt", 
            "greece": "gr", "russia": "ru", "canada": "ca", "mexico": "mx", "brazil": "br", 
            "argentina": "ar", "peru": "pe", "chile": "cl", "new zealand": "nz", "fiji": "fj", 
            "egypt": "eg", "south africa": "za", "morocco": "ma", "kenya": "ke", "nigeria": "ng", "colombia": "co"
        };

        function standardizeCountry(input) { return countryAliasMap[(input || '').trim().toLowerCase()] || (input || '').trim(); }
        
        function getContinent(cName) { 
            const c = standardizeCountry(cName).toLowerCase(); 
            for (const [continent, countries] of Object.entries(continentMapping)) { 
                if (countries.includes(c)) return continent; 
            } 
            return "Other"; 
        }

        // DOM 渲染專用：回傳圖片標籤 (無死角支援所有系統)
        function getFlag(c) { 
            const code = flagCodeMap[(c||'').toLowerCase()];
            return code ? `<img src="https://flagcdn.com/w20/${code}.png" style="width: 18px; vertical-align: middle; border-radius: 2px; margin-right: 4px; box-shadow: 0 0 2px rgba(0,0,0,0.5);">` : "📍"; 
        }

        // Alert 彈窗專用：回傳文字 Emoji (因 Alert 無法渲染 HTML)
        function getFlagText(c) {
            const code = flagCodeMap[(c||'').toLowerCase()];
            if (!code) return "📍";
            return String.fromCodePoint(...code.toUpperCase().split('').map(char => 127397 + char.charCodeAt(0)));
        }
        
        function getCountryArea(feature) {
            const name = (feature.properties?.name || feature.properties?.ADMIN || '').toLowerCase();
            if (!name) return 0;
            if (!countryAreaCache[name]) countryAreaCache[name] = turf.area(feature) / 1_000_000;
            return countryAreaCache[name];
        }
        const varCSS = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        function formatDateCN(dateStr) {
            if (!dateStr) return ''; const d = new Date(dateStr);
            return `${d.getFullYear()}年${String(d.getMonth() + 1).padStart(2, '0')}月${String(d.getDate()).padStart(2, '0')}日`;
        }

        const mapMain = L.map('map-main', { zoomControl: true }).setView([25, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OSM', minZoom: 2, maxZoom: 18 }).addTo(mapMain);

        const countryLayerGroup = L.layerGroup().addTo(mapMain);
        const regionLayerGroup = L.layerGroup(); 
        let heatLayerGroup = null; 

        window.switchMode = function(mode) {
            currentMode = mode;
            ['country', 'region', 'heat'].forEach(m => document.getElementById(`btn-mode-${m}`).classList.remove('active'));
            document.getElementById(`btn-mode-${mode}`).classList.add('active');
            
            mapMain.removeLayer(countryLayerGroup); mapMain.removeLayer(regionLayerGroup);
            if (heatLayerGroup) mapMain.removeLayer(heatLayerGroup);

            if (mode === 'country') mapMain.addLayer(countryLayerGroup);
            else if (mode === 'region') mapMain.addLayer(regionLayerGroup);
            else if (mode === 'heat') {
                const heatPoints = locations.filter(loc => loc.lat && loc.lng).map(loc => {
                    const days = calculateDays(loc.dateStart, loc.dateEnd);
                    const rank = parseInt(loc.ranking) || 10;
                    return [loc.lat, loc.lng, days * (1 / rank)]; // 權重演算法
                });
                heatLayerGroup = L.heatLayer(heatPoints, { radius: 35, blur: 20, max: 15, maxZoom: 6, gradient: {0.2: 'blue', 0.4: 'cyan', 0.6: 'lime', 0.8: 'yellow', 1.0: 'red'} }).addTo(mapMain);
            }
        };

        // ==========================================
        // 4. 繪圖與 UI 渲染
        // ==========================================
        function renderMapCountries() {
            if (!worldGeoJSON) return;
            countryLayerGroup.clearLayers();
            const countryDaysMap = {};
            locations.forEach(loc => {
                const cName = (loc.country || '').toLowerCase();
                countryDaysMap[cName] = (countryDaysMap[cName] || 0) + calculateDays(loc.dateStart, loc.dateEnd);
            });
            const maxDays = Math.max(...Object.values(countryDaysMap), 1); 
            let totalExploredAreaKm2 = 0;

            L.geoJSON(worldGeoJSON, {
                style: (feature) => {
                    const countryName = (feature.properties?.name || feature.properties?.ADMIN || '').toLowerCase();
                    const days = countryDaysMap[countryName] || 0;
                    const isVisited = days > 0;
                    if (isVisited) totalExploredAreaKm2 += getCountryArea(feature);

                    let fillColor = varCSS('--country-default'); let fillOpacity = 0.2;
                    if (isVisited) {
                        fillOpacity = 0.4 + (0.5 * (days / maxDays));
                        if (days > 14) fillColor = '#166534'; else if (days > 5) fillColor = '#22c55e'; else fillColor = '#4ade80';
                    }
                    return { fillColor: fillColor, weight: 1, color: varCSS('--country-border'), fillOpacity: fillOpacity };
                }
            }).addTo(countryLayerGroup);

            document.getElementById('explore-percent').innerText = `${((totalExploredAreaKm2 / EARTH_LAND_AREA_KM2) * 100).toFixed(4)}%`;
            document.getElementById('explore-area').innerText = `${Math.round(totalExploredAreaKm2).toLocaleString()} km² / 1.48億 km²`;
        }

        function renderMapRegions() {
            regionLayerGroup.clearLayers();
            locations.forEach(loc => {
                const days = calculateDays(loc.dateStart, loc.dateEnd);
                const popupContent = `<strong>${getFlag(loc.country)} ${loc.region}</strong><br>${loc.country}<br>🏆 Vibe 排名: No.${loc.ranking}<br>⏱️ 停留: ${days} 天`;
                if (loc.geojson && (loc.geojson.type === 'Polygon' || loc.geojson.type === 'MultiPolygon')) {

        window.playTimeline = async function() {
            const validLocs = [...locations].filter(l => l.lat && l.lng && extractYear(l)).sort((a,b) => {
                const ta = a.dateStart ? new Date(a.dateStart).getTime() : a.id;
                const tb = b.dateStart ? new Date(b.dateStart).getTime() : b.id;
                return ta - tb;
            });
            if (validLocs.length === 0) return alert('無包含日期的戰報可推演！');
            
            switchMode('region'); regionLayerGroup.clearLayers();
            const btn = document.querySelector('button[onclick="playTimeline()"]');
            btn.innerText = '推演中... ⏳'; btn.disabled = true;

            // 最終鎖定的軌跡線 (實線) 與 移動中的連線 (虛線)
            const finalPathLine = L.polyline([], { color: '#fbbf24', weight: 3, opacity: 0.8 }).addTo(regionLayerGroup);
            const animatingPathLine = L.polyline([], { color: '#fbbf24', weight: 3, dashArray: '5, 8', opacity: 0.9 }).addTo(regionLayerGroup);
            const personIcon = L.divIcon({ 
                html: '<div style="font-size: 28px; text-shadow: 2px 2px 4px rgba(0,0,0,0.6); transform: scaleX(-1);">🚶‍♂️</div>', 
                className: '', iconSize: [28, 28], iconAnchor: [14, 28] 
            });
            
            let movingMarker = null;
            let completedPath = [];
            let currentContinuousLng = null; // 👉 核心：連續經度追蹤器，徹底解決折返跑 Bug

            function animateMovement(startCoords, endCoords, duration) {
                return new Promise(resolve => {
                    const startTime = performance.now();
                    function step(currentTime) {
                        let progress = Math.min((currentTime - startTime) / duration, 1);
                        
                        // 加入 Easing 讓移動更自然 (先快後慢)
                        const easeOutQuad = progress * (2 - progress);

                        let currentLat = startCoords[0] + (endCoords[0] - startCoords[0]) * easeOutQuad;
                        let currentLng = startCoords[1] + (endCoords[1] - startCoords[1]) * easeOutQuad;
                        
                        movingMarker.setLatLng([currentLat, currentLng]);
                        animatingPathLine.setLatLngs([startCoords, [currentLat, currentLng]]);
                        
                        if (progress < 1) {
                            requestAnimationFrame(step);
                        } else {
                            animatingPathLine.setLatLngs([]); // 清除虛線
                            resolve();
                        }
                    }
                    requestAnimationFrame(step);
                });
            }

            for (let i = 0; i < validLocs.length; i++) {
                const loc = validLocs[i];
                let targetLat = loc.lat;
                let targetLng = loc.lng;
                
                if (i === 0) {
                    currentContinuousLng = targetLng; // 基準點
                    const startCoords = [targetLat, currentContinuousLng];
                    
                    mapMain.flyTo(startCoords, 5, { duration: 1.5 });
                    movingMarker = L.marker(startCoords, {icon: personIcon}).addTo(regionLayerGroup);
                    completedPath.push(startCoords);
                    
                    await new Promise(r => setTimeout(r, 1500)); 
                } else {
                    const prevCoords = completedPath[completedPath.length - 1];
                    
                    // 👉 換日線突破演算法：計算最短平移經度
                    let lngDiff = targetLng - (currentContinuousLng % 360);
                    if (lngDiff > 180) lngDiff -= 360;
                    else if (lngDiff < -180) lngDiff += 360;
                    
                    currentContinuousLng += lngDiff;
                    const nextCoords = [targetLat, currentContinuousLng];
                    
                    // 真實距離等速運算
                    const distKm = turf.distance(turf.point([prevCoords[1], prevCoords[0]]), turf.point([targetLng, targetLat]));
                    let moveDuration = (distKm / 2000) * 1000; // 每秒 2000 公里
                    moveDuration = Math.max(1200, Math.min(moveDuration, 4000)); // 限制在 1.2秒 ~ 4秒 之間
                    
                    // 鏡頭與小人同步平移
                    mapMain.flyTo([targetLat, currentContinuousLng], 4, { duration: moveDuration / 1000 });
                    await animateMovement(prevCoords, nextCoords, moveDuration);
                    
                    completedPath.push(nextCoords);
                    finalPathLine.setLatLngs(completedPath); // 鎖死真實軌跡
                }
                
                // 抵達後點亮據點
                L.circleMarker([targetLat, currentContinuousLng], { color: '#fbbf24', fillColor: '#fbbf24', fillOpacity: 0.9, radius: 8 })
                 .bindPopup(`<strong>${getFlag(loc.country)} ${loc.region}</strong><br>📅 ${loc.dateRange || loc.dateStart}`)
                 .addTo(regionLayerGroup).openPopup();
                
                await new Promise(r => setTimeout(r, 1000)); 
            }
            
            alert('✅ 戰略推演完畢！');
            btn.innerText = '▶️ 軌跡推演'; btn.disabled = false;
            renderMapRegions(); 
        };

        window.recommendNext = function() {
            if (locations.length === 0) return alert('請先輸入戰報，AI 才能分析偏好！');
            const continentRankings = {};
            locations.forEach(l => {
                const cont = getContinent(l.country);
                if (!continentRankings[cont]) continentRankings[cont] = [];
                continentRankings[cont].push(parseInt(l.ranking) || 10);
            });
            let bestContinent = 'Europe'; let bestAvgRank = 99;
            for (const [cont, ranks] of Object.entries(continentRankings)) {
                if (cont === 'Other') continue;
                const avg = ranks.reduce((a,b)=>a+b,0) / ranks.length;
                if (avg < bestAvgRank) { bestAvgRank = avg; bestContinent = cont; }
            }
            const visited = new Set(locations.map(l => standardizeCountry(l.country).toLowerCase()));
            const targetPool = continentMapping[bestContinent].filter(c => !visited.has(c));
            if (targetPool.length === 0) return alert(`🗺️ 太強了！你在 ${bestContinent} 已經沒有常見戰略盲區，建議將目光轉向新興板塊！`);
            const recommendation = targetPool[Math.floor(Math.random() * targetPool.length)].toUpperCase();
            alert(`🤖 [AI 戰略分析]\n\n數據顯示你在【${bestContinent}】獲得的高排名比例極高。\n結合板塊空缺分析，強烈建議你下一站部署：\n🎯 【 ${getFlagText(recommendation)} ${recommendation} 】`);
        };

        // 啟動應用程式
        initApp();

    </script>
</body>
</html>
